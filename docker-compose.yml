services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8800:8800"
    environment:
      - LITELLM_BASE_URL=http://host.docker.internal:4000
      - LITELLM_API_KEY=sk-litellm-master-key
      - NEXUS_DB_PATH=/data/nexus.db
    volumes:
      - nexus-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nexus-data:
